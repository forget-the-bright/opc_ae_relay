<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>OPC AE 报警转发系统</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 顶部标题 -->
    <header class="header">
        <h1>OPC AE 报警转发系统</h1>
    </header>

    <div class="container">
        <!-- 左侧菜单 -->
        <aside class="sidebar">
            <div class="menu-item active" data-target="opc1">
                <h3>OPC 1</h3>
                <p class="status" id="status-opc1">连接中...</p>
            </div>
            <div class="menu-item" data-target="opc2">
                <h3>OPC 2</h3>
                <p class="status" id="status-opc2">连接中...</p>
            </div>
        </aside>

        <!-- 右侧内容区 -->
        <main class="content">
            <!-- 状态信息面板 -->
            <section class="info-panel" id="info-opc1" style="display:block;">
                <h2>OPC 1 状态信息</h2>
                <div class="info-grid">
                    <div class="info-item">
                        <label>服务器 IP:</label>
                        <span id="opc1-ip">--</span>
                    </div>
                    <div class="info-item">
                        <label>ProgID:</label>
                        <span id="opc1-progid">--</span>
                    </div>
                    <div class="info-item">
                        <label>运行状态:</label>
                        <span id="opc1-running">--</span>
                    </div>
                    <div class="info-item">
                        <label>线程 ID:</label>
                        <span id="opc1-thread">--</span>
                    </div>
                </div>
            </section>

            <section class="info-panel" id="info-opc2" style="display:none;">
                <h2>OPC 2 状态信息</h2>
                <div class="info-grid">
                    <div class="info-item">
                        <label>服务器 IP:</label>
                        <span id="opc2-ip">--</span>
                    </div>
                    <div class="info-item">
                        <label>ProgID:</label>
                        <span id="opc2-progid">--</span>
                    </div>
                    <div class="info-item">
                        <label>运行状态:</label>
                        <span id="opc2-running">--</span>
                    </div>
                    <div class="info-item">
                        <label>线程 ID:</label>
                        <span id="opc2-thread">--</span>
                    </div>
                </div>
            </section>

            <!-- 日志模块 -->
            <section class="log-panel">
                <h2>实时日志（最近 100 条）</h2>
                <div class="log-container" id="log-container"></div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
