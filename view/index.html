<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>OPC AE 报警转发系统</title>
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
<!-- 顶部标题 -->
<header class="header">
    <h1>OPC AE 报警转发系统</h1>
</header>

<div class="container">
    <!-- 左侧菜单 -->
    <aside class="sidebar">
        @Each.Model.OpcServers
        <div class="menu-item @Current.ActiveClass" data-target="@Current.Key">
            <h3>@Current.Name</h3>
            <p class="status" id="status-@Current.Key">连接中...</p>
        </div>
        @EndEach
    </aside>

    <!-- 右侧内容区 -->
    <main class="content">
        <!-- 状态信息面板 -->
        @Each.Model.OpcServers
        <section class="info-panel" id="info-@Current.Key" style="display: @Current.DisplayStyle;">
            <h2>@Current.Name 状态信息</h2>
            <div class="info-grid">
                <div class="info-item">
                    <label>服务器 IP:</label>
                    <span id="ip-@Current.Key">--</span>
                </div>
                <div class="info-item">
                    <label>ProgID:</label>
                    <span id="progid-@Current.Key">--</span>
                </div>
                <div class="info-item">
                    <label>运行状态:</label>
                    <span id="running-@Current.Key">--</span>
                </div>
                <div class="info-item">
                    <label>线程重启次数:</label>
                    <span id="thread-@Current.Key">--</span>
                </div>
            </div>
        </section>
        @EndEach


        <!-- 日志模块 -->
        <section class="log-panel">
            <h2>实时日志（最近 100 条）</h2>
            <div class="log-container" id="log-container"></div>
        </section>
    </main>
</div>

<script src="/static/app.js"></script>
</body>
</html>
